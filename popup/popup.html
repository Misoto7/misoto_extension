<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Misoto</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
    :root {
      --bg:#08090d;--surface:#0f1117;--surface2:#161820;--border:#1c1e28;--border2:#252836;
      --accent:#3dd9a4;--accent-d:#29b589;--accent-g:rgba(61,217,164,.12);
      --red:#f05c6e;--amber:#f0a23a;--blue:#4d9ef5;--purple:#a78bfa;--cyan:#06b6d4;--pink:#e879f9;
      --text:#d8dae8;--muted:#525470;--muted2:#3a3c52;
      --mono:'DM Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{width:300px;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px}
    
    .header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:9px}
    .logo-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);letter-spacing:.05em}
    
    .sec{padding:11px 16px;border-bottom:1px solid var(--border)}
    .sec-label{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
    
    .master{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .master-text{flex:1}
    .master-title{font-weight:500;font-size:13px}
    .master-sub{font-size:9.5px;color:var(--muted);margin-top:2px}
    
    .tog{position:relative;width:44px;height:24px}
    .tog input{opacity:0;position:absolute}
    .tog-track{position:absolute;inset:0;background:var(--surface2);border:1px solid var(--border2);border-radius:99px;cursor:pointer;transition:background .25s,border-color .25s,box-shadow .25s}
    .tog-track::after{content:'';position:absolute;width:16px;height:16px;background:var(--muted);border-radius:50%;top:3px;left:3px;transition:transform .25s cubic-bezier(.34,1.56,.64,1),background .25s,box-shadow .25s}
    .tog input:checked~.tog-track{background:var(--accent-g);border-color:var(--accent-d);box-shadow:0 0 8px rgba(61,217,164,.25)}
    .tog input:checked~.tog-track::after{transform:translateX(20px);background:var(--accent);box-shadow:0 0 6px rgba(61,217,164,.6)}

    /* Animação de pulso ao ligar/desligar */
    @keyframes tog-on{0%{box-shadow:0 0 0 0 rgba(61,217,164,.5)}70%{box-shadow:0 0 0 7px rgba(61,217,164,0)}100%{box-shadow:0 0 8px rgba(61,217,164,.25)}}
    @keyframes tog-off{0%{box-shadow:0 0 0 0 rgba(240,92,110,.4)}70%{box-shadow:0 0 0 7px rgba(240,92,110,0)}100%{box-shadow:none}}
    .tog-track.anim-on{animation:tog-on .45s ease forwards}
    .tog-track.anim-off{animation:tog-off .45s ease forwards}

    /* Feedback visual no master ao ligar/desligar */
    @keyframes master-flash-on{0%,100%{background:transparent}30%{background:rgba(61,217,164,.06)}}
    @keyframes master-flash-off{0%,100%{background:transparent}30%{background:rgba(240,92,110,.06)}}
    .master.flash-on{animation:master-flash-on .4s ease}
    .master.flash-off{animation:master-flash-off .4s ease}
    
    .profile-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .pbtn{
      padding:8px 4px;
      border:1px solid var(--border2);
      border-radius:8px;
      background:var(--surface);
      color:var(--muted);
      cursor:pointer;
      text-align:center;
      transition:all .18s;
      font-family:var(--mono);
      font-size:9px;
      font-weight:500;
    }
    .pbtn .pi{font-size:18px;display:block;margin-bottom:4px}
    .pbtn:hover{color:var(--text);background:var(--surface2)}
    .pbtn.act{border-color:var(--accent);background:rgba(61,217,164,.1);color:var(--accent)}
    
    .mod-list{display:flex;flex-direction:column;gap:2px}
    .mod-row{display:flex;align-items:center;gap:8px;padding:6px 2px}
    .mod-icon{font-size:13px;width:20px}
    .mod-label{flex:1;font-size:10.5px}
    .mod-tag{font-size:7px;padding:1px 5px;border-radius:3px;background:rgba(77,158,245,.15);color:var(--blue)}
    
    .mtog{position:relative;width:30px;height:17px}
    .mtog input{opacity:0;position:absolute}
    .mtog-track{position:absolute;inset:0;background:var(--surface2);border:1px solid var(--border2);border-radius:99px;cursor:pointer;transition:background .2s,border-color .2s}
    .mtog-track::after{content:'';position:absolute;width:11px;height:11px;background:var(--muted2);border-radius:50%;top:2px;left:2px;transition:transform .22s cubic-bezier(.34,1.56,.64,1),background .2s}
    .mtog input:checked~.mtog-track{background:var(--accent-g);border-color:var(--accent-d)}
    .mtog input:checked~.mtog-track::after{transform:translateX(13px);background:var(--accent)}
    .mtog.disabled{opacity:.3;pointer-events:none}

    @keyframes mod-row-flash{0%,100%{background:transparent}40%{background:rgba(61,217,164,.07)}}
    .mod-row.flash{border-radius:6px;animation:mod-row-flash .35s ease}
    
    .help-btn{background:none;border:1px solid var(--border2);border-radius:50%;width:22px;height:22px;color:var(--muted);cursor:pointer}
    .help-btn:hover{color:var(--purple);border-color:var(--purple)}
    
    /* HELP OVERLAY - TAMANHO MAIOR */
    .help-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.85);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:99999;
      backdrop-filter:blur(4px);
    }
    .help-card{
      background:var(--bg);
      border:1px solid var(--purple);
      border-radius:16px;
      padding:20px;
      width:420px;
      max-width:90vw;
      max-height:85vh;
      overflow-y:auto;
      box-shadow:0 20px 40px rgba(0,0,0,.5);
    }
    .help-card::-webkit-scrollbar{width:5px}
    .help-card::-webkit-scrollbar-track{background:var(--surface2);border-radius:10px}
    .help-card::-webkit-scrollbar-thumb{background:var(--purple);border-radius:10px}
    
    .help-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
    .help-title{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--purple)}
    .help-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 4px}
    .help-close:hover{color:var(--purple)}
    
    .help-sec{margin-bottom:16px}
    .help-sec-title{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border2);letter-spacing:.5px}
    .help-item{display:flex;gap:10px;padding:6px 0}
    .help-icon{font-size:14px;width:24px;text-align:center;flex-shrink:0}
    .help-text{flex:1}
    .help-label{font-size:11px;font-weight:600;color:var(--text);display:block;margin-bottom:2px}
    .help-desc{font-size:10px;color:var(--muted);line-height:1.4}
  </style>
</head>
